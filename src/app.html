<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />
		<meta name="theme-color" content="#0f1320" />
		<meta name="description" content="ABENERP — Your CAD. Your part. Made." />
		<meta name="author" content="ABENERP" />
		<meta name="robots" content="index, follow" />

		<!--
		  Host-dependent meta (canonical, og:url, og:image, twitter:image) lives in
		  src/routes/+layout.svelte so it can pull the deploy's public origin from
		  the ABERP_SITE_PUBLIC_URL env var via the root server load. Host-agnostic
		  tags stay here in the static template.
		-->
		<meta property="og:type" content="website" />
		<meta property="og:title" content="ABENERP — Your CAD. Your part. Made." />
		<meta
			property="og:description"
			content="Custom CAM-quoted parts manufactured from your CAD. Upload, quote, manufacture."
		/>
		<meta property="og:image:width" content="1200" />
		<meta property="og:image:height" content="630" />
		<meta property="og:locale" content="en_US" />

		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:title" content="ABENERP — Your CAD. Your part. Made." />
		<meta
			name="twitter:description"
			content="Custom CAM-quoted parts manufactured from your CAD. Upload, quote, manufacture."
		/>

		<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
		<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
		<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
		<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
